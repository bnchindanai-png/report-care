<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>
  <!-- Document/clipboard shape -->
  <rect x="148" y="80" width="216" height="280" rx="20" fill="white" opacity="0.95"/>
  <!-- Clipboard clip -->
  <rect x="210" y="60" width="92" height="40" rx="10" fill="white"/>
  <rect x="226" y="68" width="60" height="24" rx="8" fill="#2563EB"/>
  <!-- Report lines -->
  <rect x="185" y="150" width="142" height="14" rx="4" fill="#2563EB" opacity="0.7"/>
  <rect x="185" y="180" width="110" height="14" rx="4" fill="#93C5FD" opacity="0.8"/>
  <rect x="185" y="210" width="126" height="14" rx="4" fill="#2563EB" opacity="0.7"/>
  <rect x="185" y="240" width="90" height="14" rx="4" fill="#93C5FD" opacity="0.8"/>
  <rect x="185" y="270" width="142" height="14" rx="4" fill="#2563EB" opacity="0.5"/>
  <rect x="185" y="300" width="100" height="14" rx="4" fill="#93C5FD" opacity="0.6"/>
  <!-- Checkmark circle (bottom right) -->
  <circle cx="340" cy="380" r="70" fill="#10B981"/>
  <circle cx="340" cy="380" r="62" fill="none" stroke="white" stroke-width="6"/>
  <polyline points="308,380 330,402 372,358" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Speed lines (fast indicator) -->
  <rect x="80" y="180" width="50" height="8" rx="4" fill="white" opacity="0.6"/>
  <rect x="95" y="210" width="40" height="8" rx="4" fill="white" opacity="0.4"/>
  <rect x="80" y="240" width="50" height="8" rx="4" fill="white" opacity="0.6"/>
</svg>
